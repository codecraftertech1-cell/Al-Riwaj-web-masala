<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350">
  <!-- Pakistan Map Outline -->
  <path d="M120,70 L170,40 L240,30 L310,45 L360,80 L375,130 L365,190 L330,250 L280,300 L220,320 L160,310 L110,270 L80,220 L90,160 L100,110 Z" 
        fill="#E37019" 
        stroke="#FF8C00" 
        stroke-width="2"/>
  
  <!-- Sindh Province -->
  <path d="M200,190 L260,175 L310,190 L320,230 L300,270 L250,285 L200,265 L180,230 Z" 
        fill="#E37019" 
        opacity="0.85"/>
  
  <!-- Punjab Province -->
  <path d="M130,110 L190,80 L240,75 L260,110 L250,155 L210,180 L160,175 L120,150 Z" 
        fill="#E37019" 
        opacity="0.9"/>
  
  <!-- Khyber Pakhtunkhwa -->
  <path d="M90,90 L130,55 L180,50 L195,70 L180,100 L140,115 L100,110 Z" 
        fill="#E37019" 
        opacity="0.85"/>
  
  <!-- Balochistan -->
  <path d="M70,140 L90,100 L140,120 L170,160 L150,220 L100,250 L50,220 L45,180 Z" 
        fill="#E37019" 
        opacity="0.8"/>
  
  <!-- Gilgit-Baltistan -->
  <path d="M190,40 L240,25 L280,35 L265,60 L230,70 L195,60 Z" 
        fill="#E37019" 
        opacity="0.85"/>
  
  <!-- Azad Kashmir -->
  <path d="M160,70 L195,55 L220,75 L210,100 L175,105 L150,90 Z" 
        fill="#E37019" 
        opacity="0.85"/>
  
  <!-- Major Cities - White Dots -->
  <!-- Karachi -->
  <circle cx="250" cy="240" r="7" fill="#fff"/>
  <text x="250" y="265" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Karachi</text>
  
  <!-- Lahore -->
  <circle cx="185" cy="125" r="6" fill="#fff"/>
  <text x="185" y="110" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Lahore</text>
  
  <!-- Islamabad -->
  <circle cx="165" cy="90" r="5" fill="#fff"/>
  <text x="165" y="75" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Islamabad</text>
  
  <!-- Faisalabad -->
  <circle cx="175" cy="118" r="4" fill="#fff"/>
  <text x="175" y="138" text-anchor="middle" fill="#fff" font-size="9">Faisalabad</text>
  
  <!-- Rawalpindi -->
  <circle cx="158" cy="88" r="4" fill="#fff"/>
  <text x="158" y="78" text-anchor="middle" fill="#fff" font-size="8">Rawalpindi</text>
  
  <!-- Multan -->
  <circle cx="225" cy="190" r="4" fill="#fff"/>
  <text x="225" y="175" text-anchor="middle" fill="#fff" font-size="10">Multan</text>
  
  <!-- Hyderabad -->
  <circle cx="280" cy="215" r="4" fill="#fff"/>
  <text x="280" y="200" text-anchor="middle" fill="#fff" font-size="9">Hyderabad</text>
  
  <!-- Quetta -->
  <circle cx="115" cy="195" r="4" fill="#fff"/>
  <text x="115" y="180" text-anchor="middle" fill="#fff" font-size="9">Quetta</text>
  
  <!-- Sukkur -->
  <circle cx="210" cy="165" r="3" fill="#fff"/>
  <text x="210" y="155" text-anchor="middle" fill="#fff" font-size="8">Sukkur</text>
  
  <!-- Peshawar -->
  <circle cx="105" cy="130" r="3" fill="#fff"/>
  <text x="105" y="120" text-anchor="middle" fill="#fff" font-size="8">Peshawar</text>
  
  <!-- Gwadar -->
  <circle cx="265" cy="265" r="3" fill="#fff"/>
  <text x="265" y="285" text-anchor="middle" fill="#fff" font-size="8">Gwadar</text>
</svg>